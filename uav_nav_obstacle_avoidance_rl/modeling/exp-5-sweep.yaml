method: bayes
name: exp-5-reward-half-norm-sweep
metric:
  goal: maximize
  name: curriculum/composite_success_rate

parameters:
  # Custom reward parameters
  env:
    parameters:
      reward:
        parameters:
          custom:
            parameters:
              k:
                distribution: uniform
                min: 0.2
                max: 8.0
              d_thresh:
                distribution: uniform
                min: 1.0
                max: 5.0
              w_prog:
                distribution: uniform
                min: 0.001
                max: 10.0
              w_obs:
                distribution: uniform
                min: 0.001
                max: 10.0
              collision_penalty:
                distribution: uniform
                min: 5.0
                max: 20.0
              target_reached_bonus:
                distribution: uniform
                min: 5.0
                max: 20.0
              step_penalty:
                distribution: log_uniform_values
                min: 0.001
                max: 0.1

