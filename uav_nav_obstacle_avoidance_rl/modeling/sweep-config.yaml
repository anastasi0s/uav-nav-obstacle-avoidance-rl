method: bayes
name: ppo-reward-sweep
metric:
  goal: maximize
  name: eval/mean_reward

parameters:
  # PPO hyperparameters
  ppo:
    parameters:
      learning_rate:
        distribution: log_uniform_values
        min: 1e-5
        max: 1e-3
      batch_size:
        values: [32, 64, 128, 256]
      n_steps:
        values: [512, 1024, 2048, 4096]
      gamma:
        distribution: uniform
        min: 0.95
        max: 0.999
      gae_lambda:
        distribution: uniform
        min: 0.9
        max: 0.99
      clip_range:
        values: [0.1, 0.2, 0.3]
      ent_coef:
        distribution: log_uniform_values
        min: 1e-5
        max: 1e-2
      vf_coef:
        distribution: uniform
        min: 0.25
        max: 1.0

  # reward shaping hyperparameters
  # Params are nested under reward.pyflyt / reward.custom (matches config-defaults.yaml)
  env:
    parameters:
      reward:
        parameters:
          # PyFlytRewardWrapper sweep params
          pyflyt:
            parameters:
              step_penalty:
                distribution: log_uniform_values
                min: 0.01
                max: 1.0
              collision_penalty:
                distribution: uniform
                min: 50.0
                max: 200.0
              target_reached_bonus:
                distribution: uniform
                min: 50.0
                max: 200.0
          # RewardWrapper (custom, lidar-aware) sweep params
          custom:
            parameters:
              w_prog:
                distribution: uniform
                min: 0.5
                max: 3.0
              w_obs:
                distribution: uniform
                min: 0.5
                max: 3.0
              collision_penalty:
                distribution: uniform
                min: 5.0
                max: 20.0
              target_reached_bonus:
                distribution: uniform
                min: 5.0
                max: 20.0
              step_penalty:
                distribution: log_uniform_values
                min: 0.001
                max: 0.1
